name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install "ruff>=0.15"
      - name: ruff check
        run: ruff check src tests

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + extras
        run: python -m pip install -e ".[dev,render,edit]"
      # The default gate runs the portable suite. Two test classes assert
      # bit-exact hashes that depend on the numpy/Pillow build and so are NOT
      # portable across the version matrix:
      #   - slow:   golden .glb sha256 (and integration tests)
      #   - pinned: texture PNG / sim digest hash pins
      # Both are excluded here to keep CI stable. To gate them too, pin a single
      # interpreter + numpy/Pillow version in a dedicated job whose env matches
      # how the hashes were generated.
      - name: Run portable test suite
        run: pytest -m "not slow and not pinned" --cov --cov-report=term-missing
