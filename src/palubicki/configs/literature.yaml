# Literature manifest — machine-readable companion to docs/botany/sources.md.
#
# Two blocks:
#   sources:  bibliographic entries (key -> cite/url/doi/availability/format).
#             `availability: free` + a `url` => fetchable by
#             scripts/fetch_botany_sources.py; `paywall` entries are skipped
#             (their `doi` is printed instead).
#   ranges:   ✓/✗ bounds consumed by sim.diagnostics.MetricRanges. `global`
#             holds the species-agnostic defaults; `species.<name>` overrides a
#             subset. Each bound is {value: [lo, hi], source: <key>, page: ...}
#             so a reviewer can open the cited source and check the number.
#
# Values here are seeded from the previously-hardcoded MetricRanges tuples plus
# the maple decussate override; scripts/extract_botany_values.py is what grows
# the `ranges` block from the cited sources over time.

sources:
  # ── Procedural-modelling canon (algorithmicbotany.org, free PDFs) ────────
  abop:
    cite: "Prusinkiewicz, P., Lindenmayer, A. (1990). The Algorithmic Beauty of Plants. Springer-Verlag."
    url: "https://algorithmicbotany.org/papers/abop/abop.lowquality.pdf"
    availability: free
    format: pdf
  honda1971:
    cite: "Honda, H. (1971). Description of the form of trees by the parameters of the tree-like body. J. Theoretical Biology 31(2), 331-338."
    doi: "10.1016/0022-5193(71)90191-3"
    availability: paywall
    format: pdf

  # ── Structured trait/architecture databases (prefer these for extraction) ─
  baad:
    cite: "Falster, D.S. et al. (2015). BAAD: a Biomass And Allometry Database for woody plants. Ecology 96(5), 1445."
    doi: "10.1890/14-1889.1"
    url: "https://github.com/dfalster/baad/releases/download/v1.0.0/baad_data.rds"
    availability: free
    format: csv
  try_db:
    cite: "Kattge, J. et al. (2020). TRY plant trait database - enhanced coverage and open access. Global Change Biology 26(1), 119-188."
    doi: "10.1111/gcb.14904"
    url: "https://www.try-db.org/"
    availability: free  # open access, but bulk export requires a data request
    format: csv
  wood_density:
    cite: "Zanne, A.E. et al. (2009). Global wood density database. Dryad. (Chave et al. 2009, Ecology Letters 12, 351-366)."
    doi: "10.5061/dryad.234"
    # Landing page, not a direct file — Dryad serves the dataset behind its file
    # API (GET /api/v2/datasets/doi%3A10.5061%2Fdryad.234 -> files -> download).
    # Until the fetch script resolves that, drop the exported CSV into the cache
    # by hand as docs/botany/sources/wood_density.csv; the extractor reads it.
    url: "https://datadryad.org/stash/dataset/doi:10.5061/dryad.234"
    availability: free
    format: csv

  # ── Public-domain PDFs with clean tables (good extraction targets) ───────
  wood_handbook:
    cite: "USDA Forest Products Laboratory (2021). Wood Handbook - Wood as an Engineering Material. FPL-GTR-282."
    url: "https://www.fpl.fs.usda.gov/documnts/fplgtr/fplgtr282/fpl_gtr282.pdf"
    availability: free
    format: pdf
  silvics:
    cite: "Burns, R.M., Honkala, B.H. (1990). Silvics of North America. USDA Agriculture Handbook 654."
    url: "https://www.srs.fs.usda.gov/pubs/misc/ag_654/table_of_contents.htm"
    availability: free
    format: pdf
  flora_na:
    cite: "Flora of North America Editorial Committee (1993+). Flora of North America North of Mexico. efloras.org."
    url: "http://www.efloras.org/flora_page.aspx?flora_id=1"
    availability: free
    format: html

  # ── Reference texts (no structured release; hand-transcription fallback) ──
  niklas1992:
    cite: "Niklas, K.J. (1992). Plant Biomechanics: An Engineering Approach to Plant Form and Function. Univ. of Chicago Press."
    availability: paywall
    format: book
  wood_db:
    cite: "The Wood Database (wood-database.com) + USDA NRS-38 specific-gravity tables. Per-species green/oven-dry density."
    url: "https://www.wood-database.com/"
    availability: free
    format: html
  flora_dims:
    cite: "Consensus of USDA Silvics of North America, USDA PLANTS fact sheets, and Wikipedia species pages (cross-checked mature field dimensions)."
    availability: free
    format: html

# config name -> latin binomial. Single source of truth shared by the extract
# script (CSV/PDF filtering) and the docs. Realigned to North American taxa so
# the free PDF sources (Silvics of North America, Wood Handbook) match.
species_latin:
  birch: "Betula papyrifera"
  fir: "Abies balsamea"
  maple: "Acer saccharum"
  oak: "Quercus rubra"
  pine: "Pinus strobus"

ranges:
  # Reference age ~30 years. The simulator models a YOUNG tree (maturity is 80+
  # years and not worth simulating), so the architectural bounds below are
  # dimensions at ~30 years, NOT mature field-guide sizes. These age-30 numbers
  # are cross-checked growth/yield ESTIMATES (cited source: flora_dims/silvics),
  # not values lifted from a single yield table — treat them as calibration
  # targets, not gospel. Keep species configs at max_simulation_years ~= 30 so
  # diagnose compares like with like. Angle/phyllotaxy + wood-density bounds are
  # age-independent.
  #
  # Field names match the path convention documented on
  # sim.diagnostics.MetricRanges (e.g. divergence_angle_deg__order1_mean ->
  # metrics["divergence_angle_deg"][1]["mean"]).
  global:
    horton_bifurcation_ratio_mean:
      value: [3.0, 5.0]
      source: abop
      page: "ch. 1 (Strahler/Horton ordering of branching systems)"
    divergence_angle_deg__order1_mean:
      # Spiral phyllotaxis clusters around the golden angle 137.5deg.
      value: [130.0, 145.0]
      source: abop
      page: "ch. 4 (phyllotaxis, golden angle ~137.5deg)"
    insertion_angle_deg_vs_parent__order1_mean:
      # Measured at the FOUNDING internode of each order-1 axis (the branch
      # point), post-tropism (#83). branch_angle_by_order sets the emission
      # angle (~40-60deg); plagiotropy/gravitropism then lift the measured
      # first-internode angle to ~52deg (decussate maple/ash) .. ~84deg
      # (oak/birch/fir/pine). Global band brackets all six presets x seeds
      # {0,1,2}; per-species tightening is deferred to the #87 CI guard.
      value: [50.0, 90.0]
      source: honda1971
      page: "pp. 331-338 (branching-angle parameterisation; sim measured post-tropism)"

  species:
    ash:  # Fraxinus (ash) — decussate (opposite pairs), like maple. #83 adds
          # the decussate divergence band; the remaining architectural bounds
          # are inherited from global (per-species tightening deferred to #87).
      divergence_angle_deg__order1_mean:
        # Decussate between-node rotation ≈ 90deg (measured ~90-94deg); see the
        # maple note. ash was previously absent here and silently inherited the
        # golden-angle global band it could never satisfy.
        value: [80.0, 100.0]
        source: abop
        page: "ch. 4 (decussate phyllotaxis; between-node rotation ~90deg)"
    birch:  # Betula papyrifera (paper birch) — spiral phyllotaxis, slender
      divergence_angle_deg__order1_mean:
        value: [130.0, 145.0]
        source: abop
        page: "ch. 4 (spiral phyllotaxis, golden angle ~137.5deg)"
      tree_height:  # at ~30yr — fast early growth, short-lived pioneer
        value: [9.0, 14.0]
        source: flora_dims
        page: "B. papyrifera ~9-14m at 30yr (fast pioneer; mature ~20m)"
      crown_radius:
        # Widened 4.0 -> 4.8 (#87). Cited: 30yr paper birch crown spread ~9m ->
        # radius ~4.5m (the prior 4.0 ceiling was the conservative LOW end of the
        # 4-8m spread range). The extra +0.3m to 4.8 is an explicit VARIANCE margin,
        # not a literature value: crown_radius is a single-furthest-branch MAX-extent
        # measure (sim/diagnostics.py::_height_and_crown) that runs chaotic with the
        # marker cloud, so a ceiling pinned to the mean false-alarms. Sim multi-seed
        # mean ~4.46m (per-seed ~4.2-4.7), comfortably bracketed.
        value: [2.0, 4.8]
        source: flora_dims
        page: "B. papyrifera ~30yr: spread ~9m -> radius ~4.5m; +0.3m max-extent margin -> 4.8"
      trunk_base_diameter:
        value: [0.12, 0.22]
        source: flora_dims
        page: "30yr d.b.h. ~12-22cm"
      main_axis_continuation_rate:  # young excurrent pioneer; leader still leads
        value: [0.4, 1.0]
        source: flora_dims
        page: "B. papyrifera excurrent when young (single leader); sim ~0.63-0.67"
      leader_deviation_deg:  # weeping pioneer — leader fairly upright but drooping
        value: [0.0, 30.0]
        source: flora_dims
        page: "B. papyrifera monopodial-pleureur; leader near-vertical when young, sim ~12-16deg"
      reference:
        wood_density_g_cm3:
          value: [0.48, 0.55]
          source: wood_db
          page: "paper birch oven-dry density ~0.55"
    fir:  # Abies balsamea (balsam fir) — spiral leader, whorled side sprays
      divergence_angle_deg__order1_mean:
        value: [130.0, 145.0]
        source: abop
        page: "ch. 4 (spiral phyllotaxis)"
      tree_height:  # at ~30yr — slow-growing shade-tolerant conifer
        value: [7.0, 12.0]
        source: flora_dims
        page: "A. balsamea ~7-12m at 30yr (slow; mature 14-20m)"
      crown_radius:
        value: [1.5, 2.5]
        source: flora_dims
        page: "young narrow conical crown -> radius ~1.5-2.5m"
      trunk_base_diameter:
        value: [0.10, 0.20]
        source: flora_dims
        page: "30yr d.b.h. ~10-20cm"
      main_axis_continuation_rate:  # strongly excurrent spire — single dominant leader
        value: [0.6, 1.0]
        source: flora_dims
        page: "A. balsamea classic excurrent conifer (narrow conical spire); sim ~1.0"
      leader_deviation_deg:  # strongly excurrent spire — leader stands near-vertical
        value: [0.0, 20.0]
        source: flora_dims
        page: "A. balsamea narrow conical spire; vertical leader, sim ~6-7deg. #43 proxy arched it"
      reference:
        wood_density_g_cm3:
          value: [0.33, 0.40]
          source: wood_db
          page: "balsam fir oven-dry density ~0.34-0.40"
    maple:  # Acer saccharum (sugar maple) — decussate (opposite pairs)
      divergence_angle_deg__order1_mean:
        # #83: the metric measures the BETWEEN-node rotation of the opposite
        # pair (≈ 90deg), NOT the within-node 180deg pair split. Measured
        # ~93-98deg. Do not "correct" this back to a golden-angle band.
        value: [80.0, 100.0]
        source: abop
        page: "ch. 4 (decussate phyllotaxis; between-node rotation ~90deg)"
      tree_height:  # at ~30yr — slow shade-tolerant, mature 25-35m
        value: [8.0, 13.0]
        source: flora_dims
        page: "A. saccharum ~8-13m at 30yr (slow; mature 25-35m)"
      crown_radius:
        value: [2.5, 4.5]
        source: flora_dims
        page: "young crown spread ~5-9m -> radius 2.5-4.5m"
      trunk_base_diameter:
        value: [0.12, 0.25]
        source: flora_dims
        page: "30yr d.b.h. ~12-25cm"
      main_axis_continuation_rate:  # decurrent — central leader gives way to codominants
        value: [0.2, 1.0]
        source: flora_dims
        page: "A. saccharum decurrent (rounded crown, no single leader); sim ~0.33-0.93, low+noisy"
      leader_deviation_deg:  # decurrent — leader naturally wanders/gives way, loosest bound
        value: [0.0, 45.0]
        source: flora_dims
        page: "A. saccharum decurrent rounded crown; leader not strongly vertical, sim ~8-9deg"
      reference:
        wood_density_g_cm3:
          value: [0.61, 0.66]
          source: wood_db
          page: "sugar/hard maple oven-dry density ~0.66"
    oak:  # Quercus rubra (northern red oak) — spiral phyllotaxis
      divergence_angle_deg__order1_mean:
        value: [130.0, 145.0]
        source: abop
        page: "ch. 4 (spiral phyllotaxis, golden angle ~137.5deg)"
      tree_height:  # at ~30yr — moderate-to-fast, mature 20-30m
        value: [10.0, 15.0]
        source: silvics
        page: "Q. rubra ~10-15m at 30yr good site (AG-654 site index)"
      crown_radius:
        value: [3.0, 5.0]
        source: flora_dims
        page: "young crown spread ~6-10m -> radius 3-5m"
      trunk_base_diameter:
        value: [0.15, 0.30]
        source: flora_dims
        page: "30yr d.b.h. ~15-30cm (~0.5cm radial/yr)"
      main_axis_continuation_rate:  # young excurrent, decurrent only with age
        value: [0.45, 1.0]
        source: flora_dims
        page: "Q. rubra excurrent when young (central leader to ~mid-life); sim ~1.0. Bug drove it to ~0.25"
      leader_deviation_deg:  # young excurrent, becomes decurrent — moderate tolerance
        value: [0.0, 35.0]
        source: flora_dims
        page: "Q. rubra central leader when young, decurrent with age; sim ~10deg"
      reference:
        wood_density_g_cm3:
          value: [0.63, 0.70]
          source: wood_db
          page: "northern red oak oven-dry density ~0.63-0.70"
    pine:  # Pinus strobus (eastern white pine) — whorled branches
      divergence_angle_deg__order1_mean:
        # #83: whorled (k=5), so the divergence is the WITHIN-whorl nearest-
        # neighbour spacing 360/k = 72deg, NOT the golden angle. Measured ~62deg
        # (nearest-neighbour min gap, pulled a little under 72 by divergence
        # jitter); band brackets the measured value and the 72deg ideal.
        value: [52.0, 78.0]
        source: abop
        page: "ch. 4 (whorled k-merous phyllotaxis; 360/k=72deg within-whorl)"
      tree_height:  # at ~30yr — fast-growing conifer, mature 25-50m
        value: [12.0, 18.0]
        source: flora_dims
        page: "P. strobus ~12-18m at 30yr (fast; mature 25m+)"
      crown_radius:
        value: [2.5, 4.0]
        source: flora_dims
        page: "young crown spread ~5-8m -> radius 2.5-4m"
      trunk_base_diameter:
        value: [0.18, 0.35]
        source: flora_dims
        page: "30yr d.b.h. ~18-35cm"
      main_axis_continuation_rate:  # excurrent — whorled branches off one monopodial leader
        value: [0.5, 1.0]
        source: flora_dims
        page: "P. strobus excurrent (whorls off a dominant leader); sim ~0.67-0.97. Co-located-bud bug drove it far lower"
      leader_deviation_deg:  # excurrent spire — strict monopodial leader stands vertical
        value: [0.0, 20.0]
        source: flora_dims
        page: "P. strobus straight monopodial spire; sim ~6-9deg. #43 sparse proxy starved+arched it"
      reference:
        wood_density_g_cm3:
          value: [0.34, 0.38]
          source: wood_db
          page: "eastern white pine oven-dry density ~0.35"
