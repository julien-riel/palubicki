# Betula papyrifera (paper birch) — monopodial pleureur, plagiotrope faible
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode + phyllotaxy.divergence_angle_deg
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: ellipsoid
  rx: 2.5
  ry: 11.0
  rz: 2.5
  marker_count: 20000
sim:
  shoot_extension_max: 0.60
  vigor_ref: 9.5
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.25
  internode_length_jitter: 0.15
  lambda_apical: 0.95
  alpha_basipetal: 2.0
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 2.0
  sympodial:
    enabled: false
  shade_mortality:
    enabled: true
    light_threshold: 0.20
    n_consecutive_steps: 3
  # #86: shade-avoidance LEFT OFF for birch. Paper birch is a very shade-INTOLERANT
  # pioneer that does not bank reserves — it builds laterals and culls them (reactive
  # shade_mortality above), so withholding-at-initiation is not botanically warranted
  # here (acceptance criterion 1: "where warranted"). birch is the true-zero floor of
  # the tolerance->strength gradient. It must also stay off empirically: birch's canopy
  # is very sparse (total_leaf_area ~10), so even strength 0.10 removes enough foliage
  # to lift interior light, suppress the culler, and push a peripheral branch past the
  # chaotic crown_radius ceiling (mean 4.46 -> 4.90 at 0.10, 5.42 at 0.18; band [2.0,4.8]).
  # Disabled keeps crown at its calibrated ~4.46 and the determinism golden byte-identical.
  shade_avoidance:
    enabled: false
    strength: 0.0
  # Deciduous (birch turns clear yellow). Shed by the seasonal trigger at
  # sub-annual dt; lifespan is an inert ceiling (see oak.yaml for the rationale).
  leaf_phenology:
    enabled: true
    deciduous: true
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.15
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.40
  w_orthotropy_lateral: 0.05
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.45
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.10
  w_phototropism: 0.10
  w_direction_inertia: 0.5
  axis_decay: 0.88
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order: [45.0, 35.0, 30.0, 25.0]
  divergence_jitter_deg: 5.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 1
shedding:
  quality_threshold: 0.02
  window: 5
  enabled: true
  reactivation_count: 1
light:
  # Calibrated for light.voxel_edge_m=0.04 (the default; unpinned here). Changing the
  # voxel size rescales self-shading ~1/edge² and invalidates these light constants —
  # see docs/botany/realism-assessment.md "Contrat de calibration" (#85).
  enabled: true
  k_absorption: 0.45
sag:
  enabled: true
  k: 0.010
  max_bend_deg: 6.0
  rigid_axis_order: 1
geom:
  ring_sides: 8
  pipe_exponent: 2.35
  r_tip: 0.006
  bark_color: [0.85, 0.82, 0.75]
  bark_texture: "proc:birch_bark"
  # leaf_texture omitted -> albedo derived from the ovate+serrate outline.
  leaf_size: 0.05
  leaf_aspect: 0.7
  leaf_shape: ovate
  leaf_margin: serrate
  leaf_margin_depth: 0.08
  leaf_margin_count: 12
  leaf_cluster_count: 3
  leaf_autumn_color: [0.95, 0.78, 0.20]  # clear yellow
  # Hero blade (P2): folded midrib + gentle cup + recurve (modest on birch's small
  # leaves).
  leaf_blade_fold_deg: 12.0
  leaf_blade_curl: 0.10
  leaf_blade_cup: 0.08
  # Diaheliotropic: present the upper surface toward the sky.
  leaf_skyface: 0.55
  leaf_splay_deg: 20
  foliage_depth: 3
  leaf_sun_shade_k: 0.4
  petiole_length_ratio: 0.3
  petiole_radius_ratio: 0.02
  petiole_taper: 0.6
  petiole_droop_deg: 15.0
  petiole_color: [0.34, 0.44, 0.20]
  root_flare_height: 0.15
  root_flare_factor: 1.15
  root_flare_falloff: linear
  root_buttress_count: 0
  bark_tint_young: [0.90, 0.89, 0.85]
  bark_tint_mature: [0.85, 0.82, 0.75]
  bark_tint_senescent: [0.28, 0.26, 0.24]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
