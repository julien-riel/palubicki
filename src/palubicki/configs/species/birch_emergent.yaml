# Betula papyrifera — EMERGENT FORM preset (#97). Monopodial-WEEPING outlier: a narrow
# UPPER-rounded oval (sparse pioneer, gentler recipe + slender pipe). Not a cone, not a spire.
#
# Standalone preset (load with `--species birch_emergent`). Derived from birch.yaml with the
# calibrated shadow-propagation recipe baked in; the base birch.yaml stays on `bhse`
# (frozen goldens). Calibrated at the largest tractable horizon for this species
# (see max_simulation_years); literature size bands are cited at ~30yr.
envelope:
  shape: half_ellipsoid
  rx: 5.0
  ry: 14.0
  rz: 5.0
  marker_count: 20000
sim:
  shoot_extension_max: 0.6
  vigor_ref: 9.5
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.25
  internode_length_jitter: 0.15
  lambda_apical: 0.95
  alpha_basipetal: 2.0
  max_simulation_years: 18
  elongation:
    enabled: true
    tau_years: 2.0
  sympodial:
    enabled: false
  shade_mortality:
    enabled: true
    light_threshold: 0.4
    n_consecutive_steps: 3
  shade_avoidance:
    enabled: false
    strength: 0.0
  leaf_phenology:
    enabled: true
    deciduous: true
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.15
  length_banking:
    enabled: true
    profile: rounded
    persist_rate_fraction: 0.5
    young_length_floor: 0.65
    old_length_floor: 0.4
    release_years: 6.0
    decline_years: 12.0
    establish_threshold: 0.8
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.4
  w_orthotropy_lateral: 0.05
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.45
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.1
  w_phototropism: 0.1
  w_direction_inertia: 0.5
  axis_decay: 0.88
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order:
  - 45.0
  - 35.0
  - 30.0
  - 25.0
  divergence_jitter_deg: 5.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 1
shedding:
  quality_threshold: 0.02
  window: 5
  enabled: true
  reactivation_count: 1
light:
  enabled: true
  k_absorption: 0.45
sag:
  enabled: true
  k: 0.01
  max_bend_deg: 6.0
  rigid_axis_order: 1
geom:
  ring_sides: 8
  pipe_exponent: 2.3
  r_tip: 0.006
  bark_color:
  - 0.85
  - 0.82
  - 0.75
  bark_texture: proc:birch_bark
  leaf_size: 0.05
  leaf_aspect: 0.7
  leaf_shape: ovate
  leaf_margin: serrate
  leaf_margin_depth: 0.08
  leaf_margin_count: 12
  leaf_cluster_count: 3
  leaf_autumn_color:
  - 0.95
  - 0.78
  - 0.2
  leaf_blade_fold_deg: 12.0
  leaf_blade_curl: 0.1
  leaf_blade_cup: 0.08
  leaf_skyface: 0.55
  leaf_splay_deg: 20
  foliage_depth: 3
  leaf_sun_shade_k: 0.4
  petiole_length_ratio: 0.3
  petiole_radius_ratio: 0.02
  petiole_taper: 0.6
  petiole_droop_deg: 15.0
  petiole_color:
  - 0.34
  - 0.44
  - 0.2
  root_flare_height: 0.15
  root_flare_factor: 1.15
  root_flare_falloff: linear
  root_buttress_count: 0
  bark_tint_young:
  - 0.9
  - 0.89
  - 0.85
  bark_tint_mature:
  - 0.85
  - 0.82
  - 0.75
  bark_tint_senescent:
  - 0.28
  - 0.26
  - 0.24
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
exposure: shadow_propagation
shadow:
  enabled: true
  measure: pyramid
  q_dormancy: 0.3
  mortality_enabled: true
