# Abies balsamea (balsam fir) — orthotropic trunk, plagiotropic side sprays,
# 2-ranked needles via distichous_on_plagiotropic.
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode + phyllotaxy.divergence_angle_deg
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: cone
  rx: 3.0
  ry: 9.5
  rz: 3.0
  marker_count: 18000
sim:
  shoot_extension_max: 0.26
  vigor_ref: 3.0
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.25
  internode_length_jitter: 0.10
  lambda_apical: 0.88
  alpha_basipetal: 2.5
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 2.5
  sympodial:
    enabled: false
  shade_mortality:
    enabled: true
    light_threshold: 0.12
    n_consecutive_steps: 4
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.50
  w_orthotropy_lateral: 0.0
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.02
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 1.20
  w_phototropism: 0.15
  w_direction_inertia: 0.8
  axis_decay: 0.9
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order: [70.0, 55.0, 40.0, 30.0]
  divergence_jitter_deg: 3.0
  branch_angle_jitter_deg: 3.0
  dormant_reserve_count: 0
  distichous_on_plagiotropic: true
shedding:
  quality_threshold: 0.20
  window: 5
  enabled: true
  reactivation_count: 0
light:
  enabled: true
  k_absorption: 0.65
sag:
  enabled: false
geom:
  ring_sides: 8
  pipe_exponent: 2.80
  r_tip: 0.007
  bark_color: [0.40, 0.28, 0.20]
  bark_texture: "proc:pine_bark"
  leaf_texture: "proc:pine_needle"
  leaf_size: 0.05
  leaf_aspect: 0.025
  leaf_shape: linear
  leaf_margin: entire
  leaf_margin_depth: 0.0
  leaf_margin_count: 0
  leaf_cluster_count: 4
  leaf_splay_deg: 20
  foliage_depth: 3
  leaf_sun_shade_k: 0.0
  root_flare_height: 0.2
  root_flare_factor: 1.3
  root_flare_falloff: linear
  root_buttress_count: 0
  bark_tint_young: [0.58, 0.55, 0.50]
  bark_tint_mature: [0.40, 0.28, 0.20]
  bark_tint_senescent: [0.30, 0.28, 0.26]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
