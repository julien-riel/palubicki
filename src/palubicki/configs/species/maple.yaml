# Acer saccharum (sugar maple) — decussate, sympodial, reiterating, sun/shade leaves
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode (decussate ~90deg)
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: ellipsoid
  rx: 3.0
  ry: 11.0
  rz: 3.0
  marker_count: 22000
sim:
  shoot_extension_max: 0.30
  vigor_ref: 2.6
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.18
  internode_length_jitter: 0.10
  lambda_apical: 0.80
  alpha_basipetal: 2.1
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 3.0
  theta_perception_deg: 35.0
  sympodial:
    enabled: true
    q_threshold: 1.6
    n_consecutive_steps: 5
  shade_mortality:
    enabled: true
    # #86: 0.18 -> 0.15, n 3 -> 4 — co-relax the culler as shade_avoidance (below)
    # is enabled at high strength, so the two levers hold net density.
    light_threshold: 0.15
    n_consecutive_steps: 4
  # #86: shade-avoidance at initiation. Sugar maple is the canonical very-tolerant
  # broadleaf -> highest strength; withheld laterals (RESERVE) are reactivatable
  # (reactivation_count=1) — the headline bank-and-release species for the relief test.
  shade_avoidance:
    enabled: true
    strength: 0.55
  # Deciduous (sugar maple turns fiery red-orange). Shed by the seasonal trigger
  # at sub-annual dt; lifespan is an inert ceiling (see oak.yaml for rationale).
  leaf_phenology:
    enabled: true
    deciduous: true
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.15
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.32
  w_orthotropy_lateral: 0.04
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.0
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.28
  w_phototropism: 0.30
  w_direction_inertia: 0.5
  axis_decay: 0.85
phyllotaxy:
  mode: decussate
  divergence_angle_deg: 0.0
  whorl_count: 2
  branch_angle_by_order: [55.0, 38.0, 28.0, 22.0]
  divergence_jitter_deg: 4.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 2
shedding:
  quality_threshold: 0.12
  window: 5
  enabled: true
  reactivation_count: 1
sag:
  enabled: true
  k: 0.006
  max_bend_deg: 4.0
  rigid_axis_order: 1
light:
  # Calibrated for light.voxel_edge_m=0.04 (the default; unpinned here). Changing the
  # voxel size rescales self-shading ~1/edge² and invalidates these light constants —
  # see docs/botany/realism-assessment.md "Contrat de calibration" (#85).
  enabled: true
  k_absorption: 0.55
geom:
  ring_sides: 10
  pipe_exponent: 3.40
  r_tip: 0.007
  bark_color: [0.40, 0.28, 0.18]
  bark_texture: "proc:oak_bark"
  # leaf_texture omitted -> albedo is derived from the actual palmate outline
  # (silhouette + veins match the mesh and reach the petiole tip).
  # Sugar-maple leaf: fairly matte but with a touch of cuticle sheen + a little
  # vein relief, so the new blade curvature (below) catches a grazing highlight
  # instead of reading as a flat card.
  leaf_roughness: 0.82
  leaf_specular: 0.20
  leaf_normal_strength: 0.45
  leaf_size: 0.12
  leaf_aspect: 1.0
  leaf_shape: palmate
  leaf_margin: entire
  leaf_margin_depth: 0.0
  leaf_margin_count: 0
  leaf_cluster_count: 2
  leaf_splay_deg: 30.0
  foliage_depth: 4
  leaf_autumn_color: [0.85, 0.25, 0.10]  # fiery red-orange
  # Hero blade (P2): per-lobe rib fold + cross-blade cup + recurve, so the palmate
  # leaf reads as a cupped 3D surface. fold now creases each of the 5 lobes along
  # its own rib (not one central line). Subdivided fan gives the relief lamina to
  # bend across.
  leaf_blade_fold_deg: 16.0
  leaf_blade_curl: 0.16
  leaf_blade_cup: 0.12
  # Diaheliotropic: present the upper (adaxial) surface toward the sky.
  leaf_skyface: 0.7
  leaf_sun_shade_k: 0.6
  petiole_length_ratio: 0.4
  petiole_radius_ratio: 0.03  # thicker petiole reads as attached to the twig (#1)
  petiole_taper: 0.6
  petiole_droop_deg: 10.0
  petiole_color: [0.33, 0.43, 0.19]
  root_flare_height: 0.3
  root_flare_factor: 1.6
  root_flare_falloff: linear
  root_buttress_count: 3
  root_buttress_amplitude: 0.10
  bark_tint_young: [0.55, 0.52, 0.46]
  bark_tint_mature: [0.40, 0.28, 0.18]
  bark_tint_senescent: [0.26, 0.24, 0.22]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
