# Quercus robur — dense, étalé, ramure tortueuse
envelope:
  shape: half_ellipsoid
  rx: 5.0
  ry: 6.5
  rz: 5.0
  marker_count: 25000
sim:
  internode_length: 0.18
  # Oak: moderate apical dominance. 0.75 keeps the leader winning while the
  # canopy has only a few laterals; once the lateral subtree gets very large
  # the trunk apex starves and clean-bole formation happens naturally.
  lambda_apical: 0.75
  alpha_basipetal: 2.2
  max_iterations: 45
tropism:
  # Oak: strong orthotropic trunk, primary branches go more horizontal.
  w_orthotropy: 0.25
  w_phototropism: 0.35
  w_direction_inertia: 0.5
  axis_decay: 0.65
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_deg: 55
shedding:
  quality_threshold: 0.15
light:
  enabled: true
  k_absorption: 0.55
sag:
  # Subtle: large branches sag visibly under their own weight.
  enabled: true
  k: 0.005
  max_bend_deg: 5.0
  rigid_axis_order: 1
geom:
  ring_sides: 10
  pipe_exponent: 2.3
  r_tip: 0.008
  bark_color: [0.32, 0.22, 0.14]
  bark_texture: "proc:oak_bark"
  leaf_texture: "proc:oak_leaf"
  leaf_size: 0.14
  leaf_cluster_count: 3
  leaf_aspect: 1.0
  leaf_splay_deg: 25
  foliage_depth: 4
