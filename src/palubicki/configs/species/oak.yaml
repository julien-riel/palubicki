# Quercus rubra (northern red oak) — sympodial, étalé, plagiotrope modéré
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode + phyllotaxy.divergence_angle_deg
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: half_ellipsoid
  rx: 2.3
  ry: 16.5
  rz: 2.3
  marker_count: 25000
sim:
  shoot_extension_max: 0.38
  vigor_ref: 4.2
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.15
  internode_length_jitter: 0.12
  lambda_apical: 0.75
  alpha_basipetal: 2.2
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 3.0
  sympodial:
    enabled: true
    q_threshold: 1.5
    n_consecutive_steps: 4
  shade_mortality:
    enabled: true
    # #86: eased 0.20 -> 0.16 — shade_avoidance (below) is now co-tuned with the
    # culler, not stacked. Withholding laterals at initiation removes future
    # self-shading; leaving the culler aggressive would double-count shade
    # suppression and undershoot the bands.
    light_threshold: 0.16
    n_consecutive_steps: 3
  # #86: shade-avoidance at initiation — 2nd crown-density lever, distinct from the
  # reactive culler above. Red oak is intermediate-tolerance -> moderate strength;
  # withheld laterals start RESERVE and are reactivatable (reactivation_count=1).
  shade_avoidance:
    enabled: true
    strength: 0.40
  # Deciduous + marcescent (red oak holds dead leaves through winter). Real
  # shedding is the SEASONAL trigger (dormant-window entry), which only fires at
  # sub-annual dt; the lifespan is an inert safety ceiling set above the sim
  # horizon so the age cap never bites at the default annual step (where there is
  # no season and no leaf re-flush on old wood — that would just thin the crown).
  leaf_phenology:
    enabled: true
    deciduous: true
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.15
    marcescent: true
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.35
  w_orthotropy_lateral: 0.05
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.0
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.60
  w_phototropism: 0.35
  w_direction_inertia: 0.5
  axis_decay: 0.85
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order: [60.0, 40.0, 30.0, 25.0]
  divergence_jitter_deg: 5.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 2
shedding:
  # 0.08 (was 0.15): red oak retains substantial fine twig branching; shedding
  # low-quality twigs less aggressively keeps more order-1 tips, lifting the
  # Strahler/Horton bifurcation ratio from ~2.95 (just under the abop 3.0 floor)
  # to ~3.29 across seeds {0,1,2} — the #87 guardrail floor, with margin. This
  # threshold is now load-bearing for Horton; retaining more twigs also nudges UP
  # crown_radius / total_leaf_area (588->618), but the #87 multi-seed guard
  # re-checks every oak bound, so a side-effect drift would self-fail. Leaves the
  # 10yr species golden unchanged (few twigs hit the threshold that young).
  quality_threshold: 0.08
  window: 5
  enabled: true
  reactivation_count: 1
light:
  enabled: true
  k_absorption: 0.55
sag:
  enabled: true
  k: 0.005
  max_bend_deg: 4.0
  rigid_axis_order: 1
geom:
  ring_sides: 10
  pipe_exponent: 3.15
  r_tip: 0.008
  bark_color: [0.32, 0.22, 0.14]
  bark_texture: "proc:oak_bark"
  leaf_texture: "proc:oak_leaf"
  # Waxy red-oak cuticle: low roughness gives a glossy lamina highlight. Rides core
  # PBR roughnessFactor, so it reads even in viewers that drop KHR_materials_specular.
  leaf_roughness: 0.45
  leaf_size: 0.14
  leaf_aspect: 0.7
  leaf_shape: ovate
  leaf_margin: lobed
  leaf_margin_depth: 0.35
  leaf_margin_count: 7
  leaf_autumn_color: [0.55, 0.30, 0.12]  # russet brown
  # Hero blade (P2): folded midrib + gentle recurve so the broadleaf catches the
  # light with depth instead of as a flat card.
  leaf_blade_fold_deg: 14.0
  leaf_blade_curl: 0.12
  leaf_cluster_count: 3
  leaf_splay_deg: 25
  foliage_depth: 4
  leaf_sun_shade_k: 1.0
  petiole_length_ratio: 0.25
  petiole_radius_ratio: 0.03  # thicker petiole reads as attached to the twig (#1)
  petiole_taper: 0.6
  petiole_droop_deg: 12.0
  petiole_color: [0.32, 0.42, 0.18]
  root_flare_height: 0.4
  root_flare_factor: 1.8
  root_flare_falloff: smoothstep
  root_buttress_count: 5
  root_buttress_amplitude: 0.15
  bark_tint_young: [0.46, 0.40, 0.32]
  bark_tint_mature: [0.32, 0.22, 0.14]
  bark_tint_senescent: [0.22, 0.20, 0.16]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
