# Quercus rubra (northern red oak) — sympodial, étalé, plagiotrope modéré
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode + phyllotaxy.divergence_angle_deg
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: half_ellipsoid
  rx: 2.3
  ry: 16.5
  rz: 2.3
  marker_count: 25000
sim:
  shoot_extension_max: 0.38
  vigor_ref: 4.2
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.15
  internode_length_jitter: 0.12
  lambda_apical: 0.75
  alpha_basipetal: 2.2
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 3.0
  sympodial:
    enabled: true
    q_threshold: 1.5
    n_consecutive_steps: 4
  shade_mortality:
    enabled: true
    light_threshold: 0.20
    n_consecutive_steps: 3
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.35
  w_orthotropy_lateral: 0.05
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.0
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.60
  w_phototropism: 0.35
  w_direction_inertia: 0.5
  axis_decay: 0.85
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order: [60.0, 40.0, 30.0, 25.0]
  divergence_jitter_deg: 5.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 2
shedding:
  quality_threshold: 0.15
  window: 5
  enabled: true
  reactivation_count: 1
light:
  enabled: true
  k_absorption: 0.55
sag:
  enabled: true
  k: 0.005
  max_bend_deg: 4.0
  rigid_axis_order: 1
geom:
  ring_sides: 10
  pipe_exponent: 3.15
  r_tip: 0.008
  bark_color: [0.32, 0.22, 0.14]
  bark_texture: "proc:oak_bark"
  leaf_texture: "proc:oak_leaf"
  leaf_size: 0.14
  leaf_aspect: 0.7
  leaf_shape: ovate
  leaf_margin: lobed
  leaf_margin_depth: 0.35
  leaf_margin_count: 7
  leaf_cluster_count: 3
  leaf_splay_deg: 25
  foliage_depth: 4
  leaf_sun_shade_k: 1.0
  root_flare_height: 0.4
  root_flare_factor: 1.8
  root_flare_falloff: smoothstep
  root_buttress_count: 5
  root_buttress_amplitude: 0.15
  bark_tint_young: [0.46, 0.40, 0.32]
  bark_tint_mature: [0.32, 0.22, 0.14]
  bark_tint_senescent: [0.22, 0.20, 0.16]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
