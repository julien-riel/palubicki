# Quercus rubra — EMERGENT FORM preset (#97). The ROUNDED/decurrent crown emerges
# from self-shadowing (`shadow.measure: pyramid`) + a multiplicative age hump
# (`length_banking.profile: rounded`), instead of being prescribed by `envelope.shape`.
#
# Standalone preset (load with `--species oak_emergent`). Derived from oak.yaml with the
# calibrated shadow-propagation recipe baked in; the base oak.yaml stays on `bhse`
# (frozen goldens). Calibrated at the largest tractable horizon for this species
# (see max_simulation_years); literature size bands are cited at ~30yr.
envelope:
  shape: half_ellipsoid
  rx: 5.5
  ry: 15.0
  rz: 5.5
  marker_count: 25000
sim:
  shoot_extension_max: 0.38
  vigor_ref: 4.2
  vigor_dormancy: 0.5
  vigor_smoothing: 0.5
  vigor_diameter_gain: 0.15
  internode_length_jitter: 0.12
  # 0.75→0.90: apical dominance is the dominant twig-density control under
  # shadow_propagation (which removed bhse's implicit pool ceiling). 0.75 grew
  # ~123k internodes (a dense "broom"); 0.90 → ~4.5k = a clearly-branched young
  # oak (kept fuller than maple/ash since at y18 this is a larger 7m tree). Pruning/
  # dormancy don't thin the woody count; this acts at the source (lateral bud break).
  # See maple_emergent.yaml for the full rationale.
  lambda_apical: 0.90
  alpha_basipetal: 2.2
  max_simulation_years: 18
  elongation:
    enabled: true
    tau_years: 3.0
  sympodial:
    enabled: true
    q_threshold: 1.5
    n_consecutive_steps: 4
  shade_mortality:
    enabled: true
    light_threshold: 0.55
    n_consecutive_steps: 3
  shade_avoidance:
    enabled: true
    strength: 0.4
  leaf_phenology:
    enabled: true
    deciduous: true
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.15
    marcescent: true
  length_banking:
    enabled: true
    profile: rounded
    persist_rate_fraction: 0.5
    young_length_floor: 0.65
    old_length_floor: 0.4
    release_years: 6.0
    decline_years: 12.0
    establish_threshold: 2.0
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.35
  w_orthotropy_lateral: 0.05
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.0
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.6
  w_phototropism: 0.35
  w_direction_inertia: 0.5
  axis_decay: 0.85
phyllotaxy:
  mode: alternate
  divergence_angle_deg: 137.5
  branch_angle_by_order:
  - 60.0
  - 40.0
  - 30.0
  - 25.0
  divergence_jitter_deg: 5.0
  branch_angle_jitter_deg: 4.0
  dormant_reserve_count: 2
shedding:
  quality_threshold: 0.08
  window: 5
  enabled: true
  reactivation_count: 1
light:
  enabled: true
  k_absorption: 0.55
sag:
  enabled: true
  k: 0.005
  max_bend_deg: 4.0
  rigid_axis_order: 1
geom:
  ring_sides: 10
  pipe_exponent: 4.0
  r_tip: 0.008
  bark_color:
  - 0.32
  - 0.22
  - 0.14
  bark_texture: proc:oak_bark
  leaf_roughness: 0.45
  leaf_size: 0.14
  leaf_aspect: 0.7
  leaf_shape: ovate
  leaf_margin: lobed
  leaf_margin_depth: 0.35
  leaf_margin_count: 7
  leaf_autumn_color:
  - 0.55
  - 0.3
  - 0.12
  leaf_blade_fold_deg: 16.0
  leaf_blade_curl: 0.14
  leaf_blade_cup: 0.1
  leaf_skyface: 0.6
  leaf_cluster_count: 3
  leaf_splay_deg: 25
  foliage_depth: 4
  leaf_sun_shade_k: 1.0
  petiole_length_ratio: 0.25
  petiole_radius_ratio: 0.03
  petiole_taper: 0.6
  petiole_droop_deg: 12.0
  petiole_color:
  - 0.32
  - 0.42
  - 0.18
  root_flare_height: 0.4
  root_flare_factor: 1.8
  root_flare_falloff: smoothstep
  root_buttress_count: 5
  root_buttress_amplitude: 0.15
  bark_tint_young:
  - 0.46
  - 0.4
  - 0.32
  bark_tint_mature:
  - 0.32
  - 0.22
  - 0.14
  bark_tint_senescent:
  - 0.22
  - 0.2
  - 0.16
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
exposure: shadow_propagation
shadow:
  enabled: true
  measure: pyramid
  q_dormancy: 0.45
  mortality_enabled: true
