# Pinus strobus (eastern white pine) — monopodial strict, whorled, plagiotrope fort
# Calibrated to a ~30-year-old tree (see literature.yaml ranges reference age).
# Diagnose lever map (metric ✗ -> config knob):
#   tree_height          -> envelope.ry, sim.shoot_extension_max, sim.vigor_ref
#   crown_radius         -> envelope.rx / envelope.rz (crown overshoots rx ~30-50%)
#   trunk_base_diameter  -> geom.pipe_exponent (higher=thinner), sim.vigor_diameter_gain
#   divergence (order1)  -> phyllotaxy.mode (whorled)
#   bifurcation_ratio    -> sim.lambda_apical, sim.alpha_basipetal, shedding.*
envelope:
  shape: cone
  rx: 4.4
  ry: 19.0
  rz: 4.4
  marker_count: 18000
sim:
  # #7: lowered 0.70 -> 0.55 to pull the leader back into the age-30 height band
  # [12,18m]. The #7 light coupling + stronger apical dominance (below) drive the
  # leader harder; without this it raced to the envelope-cone ceiling (~19m, OOB).
  shoot_extension_max: 0.55
  vigor_ref: 20.0
  vigor_dormancy: 0.3
  vigor_smoothing: 0.7
  vigor_diameter_gain: 0.16
  internode_length_jitter: 0.10
  # #7: raised 0.65 -> 0.82. Coupling real needle area into the LAI grid
  # (light.needle_area_scale) retired the uniform terminal-bud "canopy shell" that
  # propped up the leader; with real self-shading distributed along the shoot,
  # apical dominance must be stronger to keep the excurrent white-pine spire
  # (continuation ~0.97, leader_deviation ~11deg, robust across seeds).
  lambda_apical: 0.82
  alpha_basipetal: 2.5
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 2.5
  sympodial:
    enabled: false
  shade_mortality:
    enabled: true
    light_threshold: 0.12
    n_consecutive_steps: 4
  # Evergreen: needles are retained across years (no seasonal shed). Needle
  # turnover via the age cap is deferred until leaves re-flush on old wood (no
  # re-leafing model yet — turning needles over at the default annual dt would
  # just thin the crown), so the lifespan is an inert ceiling above the sim
  # horizon. Classifies the species as evergreen; sheds nothing at dt=1.0.
  leaf_phenology:
    enabled: true
    deciduous: false
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.2
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.30
  w_orthotropy_lateral: 0.0
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.02
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.40
  w_phototropism: 0.20
  w_direction_inertia: 0.8
  axis_decay: 0.9
  # #55: reference plagiotropism and the radial insertion basis to the parent
  # branch's plane instead of world-XY, so order-2+ branchlets lie in their
  # parent limb's plane rather than climbing out toward light gaps. Pine stays
  # whorled (radial), but the per-limb frame keeps the sub-branches coherent.
  spray_plane_enabled: true
phyllotaxy:
  mode: whorled
  whorl_count: 5
  divergence_angle_deg: 72.0
  branch_angle_by_order: [75.0, 60.0, 45.0, 35.0]
  divergence_jitter_deg: 3.0
  branch_angle_jitter_deg: 3.0
  dormant_reserve_count: 0
shedding:
  quality_threshold: 0.20
  window: 5
  enabled: true
  reactivation_count: 0
light:
  enabled: true
  k_absorption: 0.65
  # #7: couple real per-needle area (fascicle multiplicity included) into the LAI
  # grid instead of the legacy terminal-bud scalar. 0.5 corrects for the flat-quad
  # needle being a ~100x inflated visual proxy of a real <1mm needle; the leader is
  # held by apical dominance (lambda_apical), not by under-depositing area.
  needle_area_scale: 0.5
sag:
  enabled: false
geom:
  ring_sides: 8
  # #7: lowered 3.18 -> 2.90 to restore trunk girth. The stronger apical dominance
  # makes the tree more monopodial (fewer lateral branches feeding the trunk's pipe
  # area), thinning it ~17% (0.21 -> 0.17m, below the [0.18,0.35] band); a lower
  # pipe exponent recovers ~0.22m. (vigor_diameter_gain saturates and doesn't move it.)
  pipe_exponent: 2.90
  r_tip: 0.007
  bark_color: [0.45, 0.25, 0.18]
  bark_texture: "proc:pine_bark"
  leaf_texture: "proc:pine_needle"
  leaf_size: 0.12
  leaf_aspect: 0.10
  leaf_shape: linear
  leaf_margin: entire
  leaf_margin_depth: 0.0
  leaf_margin_count: 0
  # #7: white pine bears 5 needles per fascicle. The fascicle replaces the loose
  # per-position tuft, so leaf_cluster_count drops to 1 — each along-shoot position
  # (needle_cluster_spacing) now carries one 5-needle bundle, not 3 scattered needles.
  leaf_cluster_count: 1
  fascicle_count: 5
  leaf_splay_deg: 25
  foliage_depth: 4
  needle_cluster_spacing: 0.08
  leaf_sun_shade_k: 0.0
  petiole_length_ratio: 0.0   # needles are sessile — no petiole stalk
  root_flare_height: 0.2
  root_flare_factor: 1.3
  root_flare_falloff: linear
  root_buttress_count: 0
  bark_tint_young: [0.62, 0.45, 0.32]
  bark_tint_mature: [0.45, 0.25, 0.18]
  bark_tint_senescent: [0.34, 0.30, 0.27]
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
