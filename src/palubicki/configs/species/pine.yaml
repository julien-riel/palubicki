# Pinus sylvestris — conifère conique, étages réguliers, apical dominant
envelope:
  shape: cone
  rx: 2.5
  ry: 9.0
  rz: 2.5
  marker_count: 18000
sim:
  internode_length: 0.18
  lambda_apical: 0.85
  alpha_basipetal: 1.8
  max_iterations: 40
tropism:
  # Conifer: strong apical dominance — orthotropy preserved across orders.
  w_orthotropy: 0.15
  w_phototropism: 0.20
  w_direction_inertia: 0.8
  axis_decay: 0.85
phyllotaxy:
  mode: whorled
  whorl_count: 5
  divergence_angle_deg: 72
  branch_angle_deg: 75
shedding:
  quality_threshold: 0.20
light:
  enabled: true
  k_absorption: 0.65
geom:
  ring_sides: 8
  pipe_exponent: 2.3
  r_tip: 0.007
  bark_color: [0.45, 0.25, 0.18]
  bark_texture: "proc:pine_bark"
  leaf_texture: "proc:pine_needle"
  leaf_size: 0.11
  leaf_cluster_count: 5
  leaf_aspect: 0.12
  leaf_splay_deg: 25
  foliage_depth: 3
