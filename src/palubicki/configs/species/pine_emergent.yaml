# Pinus strobus — EMERGENT FORM preset (#96). The CONE emerges under
# `exposure: shadow_propagation`; the prolific whorled (k=5) bud pool is bounded by
# shade mortality + a high establish_threshold (pine's large banked-vigor scale).
#
# Standalone preset (load with `--species pine_emergent`). Derived from pine.yaml with the
# calibrated shadow-propagation recipe baked in; the base pine.yaml stays on `bhse`
# (frozen goldens). Calibrated at the largest tractable horizon for this species
# (see max_simulation_years); literature size bands are cited at ~30yr.
envelope:
  shape: half_ellipsoid
  rx: 4.4
  ry: 20.0
  rz: 4.4
  marker_count: 18000
sim:
  shoot_extension_max: 0.55
  vigor_ref: 20.0
  vigor_dormancy: 0.3
  vigor_smoothing: 0.7
  vigor_diameter_gain: 0.16
  internode_length_jitter: 0.1
  # 0.82→0.94: at y30 (16m) pine grew ~303k internodes — so dense the whorls fused
  # into a solid "furry" cone (the conifer equivalent of the broadleaf broom). 0.94 →
  # ~86k = a dense but LEGIBLE cone (distinct whorls + clear leader). NB pine responds
  # far less to lambda than broadleaves (303k→86k ≈ 3.5x vs ~45x for maple/ash) — it is
  # a large, high-vigor (vigor_ref 20), whorled tree, so 86k is its realistic needle-
  # bearing structure, not a bush. fir stays at 0.88 (already a clean 31k cone).
  lambda_apical: 0.94
  alpha_basipetal: 2.5
  max_simulation_years: 30
  elongation:
    enabled: true
    tau_years: 2.5
  sympodial:
    enabled: false
  shade_mortality:
    enabled: true
    light_threshold: 0.5
    n_consecutive_steps: 5
  shade_avoidance:
    enabled: true
    strength: 0.35
  leaf_phenology:
    enabled: true
    deciduous: false
    leaf_lifespan_years: 40.0
    senescence_duration_years: 0.2
  length_banking:
    enabled: true
    profile: acropetal_ramp
    persist_rate_fraction: 0.4
    release_years: 6.0
    establish_threshold: 25.0
tropism:
  w_perception: 1.0
  w_orthotropy_main: 0.3
  w_orthotropy_lateral: 0.0
  w_gravitropism_main: 0.0
  w_gravitropism_lateral: 0.02
  w_plagiotropism_main: 0.0
  w_plagiotropism_lateral: 0.4
  w_phototropism: 0.2
  w_direction_inertia: 0.8
  axis_decay: 0.9
  spray_plane_enabled: true
phyllotaxy:
  mode: whorled
  whorl_count: 5
  divergence_angle_deg: 72.0
  branch_angle_by_order:
  - 75.0
  - 60.0
  - 45.0
  - 35.0
  divergence_jitter_deg: 3.0
  branch_angle_jitter_deg: 3.0
  dormant_reserve_count: 0
shedding:
  quality_threshold: 0.2
  window: 5
  enabled: true
  reactivation_count: 0
light:
  enabled: true
  k_absorption: 0.65
  needle_area_scale: 0.5
sag:
  enabled: false
geom:
  ring_sides: 8
  pipe_exponent: 4.0
  r_tip: 0.007
  bark_color:
  - 0.45
  - 0.25
  - 0.18
  bark_texture: proc:pine_bark
  leaf_texture: proc:pine_needle
  leaf_size: 0.12
  leaf_aspect: 0.1
  leaf_shape: linear
  leaf_margin: entire
  leaf_margin_depth: 0.0
  leaf_margin_count: 0
  leaf_cluster_count: 1
  fascicle_count: 5
  leaf_splay_deg: 25
  foliage_depth: 4
  needle_cluster_spacing: 0.08
  leaf_sun_shade_k: 0.0
  petiole_length_ratio: 0.0
  root_flare_height: 0.2
  root_flare_factor: 1.3
  root_flare_falloff: linear
  root_buttress_count: 0
  bark_tint_young:
  - 0.62
  - 0.45
  - 0.32
  bark_tint_mature:
  - 0.45
  - 0.25
  - 0.18
  bark_tint_senescent:
  - 0.34
  - 0.3
  - 0.27
  bark_blend_diameter_young: 0.015
  bark_blend_diameter_mature: 0.035
  bark_blend_diameter_senescent: 0.07
exposure: shadow_propagation
shadow:
  enabled: true
  measure: skyview
  q_dormancy: 0.5
  mortality_enabled: true
