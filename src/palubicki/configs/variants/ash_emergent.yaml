# ash — EMERGENT FORM variant (#97). Overlay on the ash preset: a rounded /
# decurrent crown emerges from self-shadowing under `exposure: shadow_propagation`.
#
# Opt-in: `generate --species ash --variant emergent`. Shipped ash.yaml stays `bhse`.
# Calibrated at max_simulation_years=10 (young sapling, fast & bounded).
#
# ash is DECUSSATE like maple → prolific bud pool, high establish_threshold; pool
# re-explodes past ~y14 (#101), so y10 is the tractable horizon. Form: ROUNDED.
exposure: shadow_propagation
envelope:
  shape: half_ellipsoid   # neutral bounds — the rounded crown EMERGES
  rx: 4.5
  ry: 14.0
  rz: 4.5
shadow:
  enabled: true
  measure: pyramid
  q_dormancy: 0.45
  mortality_enabled: true
sim:
  max_simulation_years: 10
  shade_mortality:
    light_threshold: 0.55
  length_banking:
    enabled: true
    profile: rounded
    persist_rate_fraction: 0.50
    establish_threshold: 45.0     # ~q95 of ash's banked vigor (decussate, prolific)
    young_length_floor: 0.65
    old_length_floor: 0.40
    release_years: 6.0
    decline_years: 12.0
geom:
  pipe_exponent: 4.0
