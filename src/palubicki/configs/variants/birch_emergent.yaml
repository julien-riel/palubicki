# birch — EMERGENT FORM variant (#97). Overlay on the birch preset.
#
# Opt-in: `generate --species birch --variant emergent`. Shipped birch.yaml stays
# `bhse`. Calibrated at max_simulation_years=10 (young sapling, fast & bounded).
#
# birch is the monopodial-WEEPING outlier: it makes little wood (sparse pioneer), so
# a GENTLER recipe — lower establish_threshold + its own slender pipe (not the cap)
# + gentler mortality. Form: a narrow UPPER-rounded oval (widest high, fuller top) —
# still NOT a cone and NOT a sharp spire, but not a broad dome either.
exposure: shadow_propagation
envelope:
  shape: half_ellipsoid
  rx: 5.0
  ry: 14.0
  rz: 5.0
shadow:
  enabled: true
  measure: pyramid
  q_dormancy: 0.30        # gentler — birch keeps more wood
  mortality_enabled: true
sim:
  max_simulation_years: 10
  shade_mortality:
    light_threshold: 0.40 # gentler cull (intolerant pioneer, but sparse to begin with)
  length_banking:
    enabled: true
    profile: rounded
    persist_rate_fraction: 0.50
    establish_threshold: 0.8      # low — birch makes little wood; let more persist
    young_length_floor: 0.65
    old_length_floor: 0.40
    release_years: 6.0
    decline_years: 12.0
geom:
  pipe_exponent: 2.3      # birch's slender trunk (NOT the 4.0 cap, which over-thins it)
