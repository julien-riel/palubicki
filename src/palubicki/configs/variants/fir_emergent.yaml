# fir — EMERGENT FORM variant (#94). Overlay on the fir preset: the crown shape
# emerges from light competition + age-driven branch length under
# `exposure: shadow_propagation`, instead of being prescribed by `envelope.shape`.
#
# Opt-in: `generate --species fir --variant emergent`. The shipped fir.yaml stays
# on `bhse` (goldens / #87 bands frozen). Calibrated at max_simulation_years=10
# (a young sapling) — at this horizon every species' emergent form is established
# and the run is fast; the y30 literature bands do NOT apply to a 10-yr tree.
#
# Form: a real conifer CONE — age-driven lateral length (young apex short, old base
# long) under neutral half_ellipsoid bounds. crown_monotonicity strongly negative.
exposure: shadow_propagation
envelope:
  shape: half_ellipsoid   # neutral (non-cone) bounds — the cone EMERGES
  rx: 3.0
  ry: 12.0
  rz: 3.0
shadow:
  enabled: true
  measure: skyview        # side-lit lower edge → crown widens to the base (a cone)
sim:
  max_simulation_years: 10
  length_banking:
    enabled: true
    profile: acropetal_ramp   # the cone: age REPLACES lit vigor (young short → old long)
    persist_rate_fraction: 0.45
    release_years: 6.0
geom:
  pipe_exponent: 3.6
