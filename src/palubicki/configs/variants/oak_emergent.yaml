# oak — EMERGENT FORM variant (#97). Overlay on the oak preset: a rounded /
# decurrent broadleaf crown emerges from self-shadowing under
# `exposure: shadow_propagation`, instead of `envelope.shape`.
#
# Opt-in: `generate --species oak --variant emergent`. Shipped oak.yaml stays `bhse`.
# Calibrated at max_simulation_years=10 (young sapling, fast & bounded).
#
# Form: ROUNDED — widest in the mid/upper crown (crown_widest_frac ~0.4-0.5), not a
# cone (base-wide) nor the inverted feather-duster. The `pyramid` measure (downward
# self-shadow, no side light) clears the lower interior; the `rounded` length profile
# MULTIPLIES the light-driven length by a unimodal age hump (narrows the young apex).
exposure: shadow_propagation
envelope:
  shape: half_ellipsoid   # neutral bounds — the rounded crown EMERGES
  rx: 5.5
  ry: 15.0
  rz: 5.5
shadow:
  enabled: true
  measure: pyramid        # downward self-shadow → clears the base → rounds the crown
  q_dormancy: 0.45
  mortality_enabled: true # bounds the pool + clears the lower interior
sim:
  max_simulation_years: 10
  shade_mortality:
    light_threshold: 0.55
  length_banking:
    enabled: true
    profile: rounded      # multiplicative age hump (not the cone's replace)
    persist_rate_fraction: 0.50   # establishment-engage gate (pool bound), not a length scale
    establish_threshold: 2.0      # ~q95 of oak's banked vigor (sparse alternate crown)
    young_length_floor: 0.65      # fills the apex (rounded dome top, not a spire)
    old_length_floor: 0.40        # oldest basal laterals shorten → clear-ish bole
    release_years: 6.0            # age at the widest (mid-crown) band
    decline_years: 12.0
geom:
  pipe_exponent: 4.0
