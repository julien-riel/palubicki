# pine — EMERGENT FORM variant (#96). Overlay on the pine preset: the cone emerges
# from light competition + age-driven length under `exposure: shadow_propagation`.
#
# Opt-in: `generate --species pine --variant emergent`. Shipped pine.yaml stays
# `bhse`. Calibrated at max_simulation_years=10 (young sapling, fast). pine is the
# whorled (k=5) prolific case, so it needs a BOUNDED bud pool: shade mortality under
# shadow mode (banked laterals protected) + a high establish_threshold (~q95 of
# pine's large banked-vigor scale) + q_dormancy capping emission.
#
# Form: a real conifer CONE (crown_monotonicity strongly negative).
exposure: shadow_propagation
envelope:
  shape: half_ellipsoid   # neutral (non-cone) bounds — the cone EMERGES
  rx: 4.4
  ry: 20.0
  rz: 4.4
shadow:
  enabled: true
  measure: skyview
  q_dormancy: 0.5         # caps emission (prolific whorled pool)
  mortality_enabled: true # culls the never-established interior cloud (cone preserved)
sim:
  max_simulation_years: 10
  shade_mortality:
    light_threshold: 0.50
  length_banking:
    enabled: true
    profile: acropetal_ramp
    persist_rate_fraction: 0.40
    release_years: 6.0
    establish_threshold: 25.0   # pine banked-vigor scale ~6-7× fir
geom:
  pipe_exponent: 4.0
