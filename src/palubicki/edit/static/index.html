<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>palubicki edit</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>palubicki edit</h1>
    <div class="header-actions">
      <select id="species-select" aria-label="Species preset">
        <option value="">— preset —</option>
      </select>
      <button id="regenerate-btn" type="button">Régénérer</button>
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <div id="sections-root"></div>
      <div id="top-level-root"></div>
      <div class="export-row">
        <button id="export-glb-btn" type="button" disabled>Export .glb</button>
        <button id="export-yaml-btn" type="button">Export YAML</button>
      </div>
    </aside>

    <section id="viewer" aria-label="3D viewer">
      <canvas id="viewer-canvas"></canvas>
      <div class="viewer-overlay">
        <button id="toggle-leaves-btn" type="button">Toggle leaves</button>
        <button id="toggle-wireframe-btn" type="button">Wireframe</button>
        <button id="toggle-wind-btn" type="button">Wind: on</button>
        <label class="debug-toggle">
          <input id="debug-capture-toggle" type="checkbox" /> Capture debug
        </label>
        <span id="spinner" class="spinner hidden">…</span>
      </div>
      <div id="debug-panel" class="debug-panel hidden">
        <div class="debug-layers">
          <label><input id="layer-markers-toggle" type="checkbox" checked /> Markers</label>
          <label><input id="layer-envelope-toggle" type="checkbox" checked /> Envelope</label>
          <label><input id="layer-buds-toggle" type="checkbox" checked /> Buds</label>
          <label><input id="layer-shed-toggle" type="checkbox" checked /> Shed</label>
        </div>
        <div class="debug-timeline">
          <button id="timeline-play-btn" type="button" aria-label="Play">▶</button>
          <input id="timeline-slider" type="range" min="0" max="0" step="1" value="0" />
          <span id="timeline-readout">—</span>
        </div>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>

  <script src="/static/vendor/three.min.js"></script>
  <script src="/static/vendor/GLTFLoader.js"></script>
  <script src="/static/vendor/OrbitControls.js"></script>
  <script src="/static/wind.js"></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
